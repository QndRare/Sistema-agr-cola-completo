<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Gestão Agrícola</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
background:#eef7ee;
padding:20px;
}

h1{
color:#2e7d32;
}

input,button{
padding:8px;
margin:5px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

th{
background:#2e7d32;
color:white;
}

</style>

</head>

<body>

<h1>🌱 Sistema de Gestão Agrícola</h1>

<h2>📦 Cadastro de Produtos</h2>

<input id="codigo" placeholder="Código de barras">
<input id="produto" placeholder="Produto">
<input id="quantidade" type="number" placeholder="Quantidade">
<input id="preco" type="number" placeholder="Preço">

<button onclick="adicionarProduto()">Adicionar</button>

<table>

<thead>
<tr>
<th>Código</th>
<th>Produto</th>
<th>Quantidade</th>
<th>Preço</th>
</tr>
</thead>

<tbody id="estoque"></tbody>

</table>

<h2>💰 Despesas</h2>

<input id="tipoDespesa" placeholder="Tipo (Adubo, Diesel...)">
<input id="valorDespesa" type="number" placeholder="Valor">

<button onclick="addDespesa()">Adicionar despesa</button>

<ul id="listaDespesas"></ul>

<h2>📊 Relatório</h2>

<button onclick="calcularLucro()">Calcular lucro</button>

<h3 id="lucro"></h3>

<h2>📷 Leitor de código de barras</h2>

<div id="reader" style="width:300px"></div>

<script>

let estoque = []
let despesas = []

function adicionarProduto(){

let codigo = document.getElementById("codigo").value
let produto = document.getElementById("produto").value
let quantidade = Number(document.getElementById("quantidade").value)
let preco = Number(document.getElementById("preco").value)

estoque.push({codigo,produto,quantidade,preco})

render()

}

function render(){

let tabela = document.getElementById("estoque")

tabela.innerHTML = ""

estoque.forEach(p=>{

tabela.innerHTML += `
<tr>
<td>${p.codigo}</td>
<td>${p.produto}</td>
<td>${p.quantidade}</td>
<td>${p.preco}</td>
</tr>
`

})

}

function addDespesa(){

let tipo = document.getElementById("tipoDespesa").value
let valor = Number(document.getElementById("valorDespesa").value)

despesas.push({tipo,valor})

document.getElementById("listaDespesas").innerHTML += `<li>${tipo} - R$ ${valor}</li>`

}

function calcularLucro(){

let totalProdutos = 0

estoque.forEach(p=>{
totalProdutos += p.quantidade * p.preco
})

let totalDespesas = 0

despesas.forEach(d=>{
totalDespesas += d.valor
})

let lucro = totalProdutos - totalDespesas

document.getElementById("lucro").innerText = "Lucro da safra: R$ " + lucro

}

function onScanSuccess(decodedText){

document.getElementById("codigo").value = decodedText

}

let html5QrcodeScanner = new Html5QrcodeScanner(
"reader",
{fps:10,qrbos:250}
)

html5QrcodeScanner.render(onScanSuccess)

</script>

</body>
</html>
